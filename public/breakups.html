<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Homepage</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: sans-serif;
        line-height: 1.6;
        color: #333;
    }
    .container {
        max-width: 1200px;
        padding: 20px;
        margin: auto;
    }
    header {
        background: #111;
        color: #fff;
    }
    .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
    }
    .nav a {
        color: #fff;
        text-decoration: none;
        margin-left: 20px;
    }
    .logo {
        font-weight: bold;
        font-size: 24px;
    }

    .hero {
        background: #f4f4f4;
        padding: 40px 0;
    }

    .hero-content {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 20px;
    }
    .hero-text {
        flex: 1 1 300px;
    }
    .hero-image img{
        width: 100%;
        max-width: 400px;
        height: auto;
    }
    .features {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 40px;
        justify-content: center;
    }
    .feature-card {
        flex: 1 1 1px;
        background: #ddd;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
    }
    footer {
        background: #111;
        color: #fff;
        text-align: center;
        padding: 20px 0;
        margin-top: 40px;
    }
</style>
<body>
  <header>
    <div class="container nav">
      <div class="logo">MySite</div>
      <nav>
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container hero-content">
      <div class="hero-text">
        <h1>Welcome to MySite</h1>
        <p>Learn how to build responsive layouts with Flexbox.</p>
      </div>
      <div class="hero-image">
        <img src="https://via.placeholder.com/400x250" alt="Hero Image" />
      </div>
    </div>
  </section>

  <section class="features container">
    <div class="feature-card">💡 Fast</div>
    <div class="feature-card">📱 Responsive</div>
    <div class="feature-card">⚙️ Flexible</div>
    <div class="feature-card">🚀 Powerful</div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2025 MySite. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
